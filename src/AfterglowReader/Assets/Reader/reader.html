<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>/*__READER_CSS__*/</style>
</head>
<body>
  <main id="reader">
    <header id="toolbar" aria-label="阅读工具栏">
      <span id="app-label" data-window-action title="按住拖动窗口">余光阅读器</span>
      <div id="toolbar-actions">
        <button id="open-file" type="button">打开文件</button>
        <button id="directory-toggle" type="button">目录</button>
        <button id="auto-scroll" type="button">自动滚动</button>
        <button id="settings-toggle" type="button">设置</button>
      </div>
    </header>
    <section id="settings-panel" class="hidden" aria-label="阅读设置">
      <label>字体 <select id="font-family"><option value="Microsoft YaHei">微软雅黑</option></select></label>
      <label>字号 <input id="font-size" type="range" min="12" max="64" step="1"></label>
      <label>字重 <select id="font-weight"><option value="400">常规</option><option value="500">中等</option><option value="600">半粗</option><option value="700">粗体</option></select></label>
      <label>字色 <input id="text-color" type="color"></label>
      <label>行距 <input id="line-height" type="range" min="1.1" max="3.5" step="0.1"></label>
      <label>字距 <input id="letter-spacing" type="range" min="-1" max="5" step="0.1"></label>
      <label>背景不透明度 <input id="opacity" type="range" min="0.35" max="1" step="0.01"></label>
      <label><input id="opaque-page" type="checkbox">暖白正文背景</label>
      <label>滚动速度 <input id="scroll-speed" type="range" min="20" max="2000" step="10"></label>
      <span id="settings-preview">余光阅读：中文排版即时预览 Aa 123</span>
      <button id="settings-confirm" type="button">确定</button>
      <button id="settings-cancel" type="button">取消</button>
    </section>
    <div id="reader-body">
      <aside id="directory" aria-label="章节目录">
        <nav id="chapters" aria-label="chapters"></nav>
      </aside>
      <article id="content">
        <h1>余光阅读器</h1>
        <p>打开 TXT、EPUB 或 MOBI 后，内容会使用统一的章节模型渲染。</p>
      </article>
    </div>
    <section id="book-complete" class="hidden" aria-live="polite">
      <span>本书已读完</span>
      <div>
        <button id="complete-open" type="button">打开新书</button>
        <button id="complete-directory" type="button">查看目录</button>
        <button id="complete-restart" type="button">回到开头</button>
      </div>
    </section>
    <div id="toast" role="status" aria-live="polite" hidden></div>
  </main>
  <div class="window-resize-handle top" data-window-action data-edge="top" aria-hidden="true"></div>
  <div class="window-resize-handle right" data-window-action data-edge="right" aria-hidden="true"></div>
  <div class="window-resize-handle bottom" data-window-action data-edge="bottom" aria-hidden="true"></div>
  <div class="window-resize-handle left" data-window-action data-edge="left" aria-hidden="true"></div>
  <div class="window-resize-handle top-left" data-window-action data-edge="topLeft" aria-hidden="true"></div>
  <div class="window-resize-handle top-right" data-window-action data-edge="topRight" aria-hidden="true"></div>
  <div class="window-resize-handle bottom-left" data-window-action data-edge="bottomLeft" aria-hidden="true"></div>
  <div class="window-resize-handle bottom-right" data-window-action data-edge="bottomRight" aria-hidden="true"></div>
  <script>/*__READER_JS__*/</script>
</body>
</html>
